version: '3'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  backend:
    env_file: .env
    image: sauld/foodgram_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - static:/static/static
      - media:/media
  frontend:
    env_file: .env
    command: cp -r /app/build/. /static/
    image: sauld/foodgram_frontend
    volumes:
      - static:/static
      - media:/media
  gateway:
    env_file: .env
    image: sauld/foodgram_gateway
    ports:
      - 9000:80
    volumes:
      - static:/static
      - media:/media
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
