              $ref: '#/components/schemas/RecipeList'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RecipeList'
        required: true
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeList'
          description: ''
    delete:
      operationId: recipes_favorite_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Рецепт.
        required: true
      tags:
